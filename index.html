<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4A6FA5">
<title>Correlatio</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --sand: #F5F0E8;
    --sand2: #EDE8DF;
    --ink: #1C1A17;
    --ink2: #2C2A27;
    --muted: #8A7F72;
    --accent: #4A6FA5;
    --gold: #C9A84C;
    --border: #D4C9B8;
    --error: #B04040;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    background: var(--sand);
    color: var(--ink2);
    font-family: 'Jost', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    /* rispetta le aree sicure di iPhone (tacca, barra home) */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  #app { min-height: 100vh; display: flex; flex-direction: column; }

  .header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--sand);
    position: sticky;
    top: env(safe-area-inset-top);
    z-index: 10;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--ink);
  }

  .azienda-selector {
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    color: var(--accent);
    background: white;
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .content { flex: 1; padding: 20px; padding-bottom: 40px; }

  .stato-msg {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }

  .stato-msg.errore { color: var(--error); }

  .kpi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .kpi-card {
    background: white;
    border: 1px solid var(--border);
    padding: 14px 16px;
  }

  .kpi-label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .kpi-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    color: var(--ink);
    line-height: 1;
  }

  .kpi-delta {
    font-size: 11px;
    margin-top: 5px;
  }
  .kpi-delta.up { color: var(--accent); }
  .kpi-delta.down { color: var(--error); }
  .kpi-delta.neutral { color: var(--muted); }

  .sec-label {
    font-size: 10px;
    color: var(--gold);
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin: 24px 0 10px;
  }

  .chart-card {
    background: white;
    border: 1px solid var(--border);
    padding: 16px;
  }

  .bars {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 70px;
    margin-top: 10px;
  }

  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { width: 100%; min-height: 3px; background: var(--border); }
  .bar.ultimo { background: var(--accent); }
  .bar-lbl { font-size: 9px; color: var(--muted); }

  .sync-info {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 24px;
  }

  .tab-bar {
    display: flex;
    background: white;
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .tab {
    flex: 1;
    padding: 10px 0 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    color: var(--muted);
    font-size: 10px;
    font-weight: 500;
  }

  .tab.active { color: var(--accent); }
  .tab-icon { font-size: 18px; }

  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .item-card {
    background: white;
    border: 1px solid var(--border);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .item-nome { font-size: 13px; font-weight: 500; color: var(--ink); }
  .item-data { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .item-importo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    color: var(--ink);
    white-space: nowrap;
  }

  .badge {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border: 1px solid;
    display: inline-block;
    margin-top: 4px;
  }
  .badge.pagata { color: var(--accent); border-color: var(--accent); background: #f0f4fa; }
  .badge.in_attesa { color: #8A6A00; border-color: var(--gold); background: #fdf9f0; }
  .badge.scaduta { color: var(--error); border-color: var(--error); background: #fdf0f0; }

  .vuoto-msg {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 30px 10px;
  }

  .mag-bar-bg { height: 4px; background: var(--sand2); margin-top: 8px; }
  .mag-bar-fill { height: 4px; }
  .mag-status { font-size: 11px; margin-top: 4px; }
  .mag-status.ok { color: var(--accent); }
  .mag-status.attenzione { color: #8A6A00; }
  .mag-status.critico { color: var(--error); }

  /* ---- Guida installazione ---- */
  .guida-overlay {
    position: fixed;
    inset: 0;
    background: var(--sand);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px 28px 40px;
    text-align: center;
    padding-top: calc(50px + env(safe-area-inset-top));
    padding-bottom: calc(40px + env(safe-area-inset-bottom));
  }

  .guida-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--ink);
    margin-bottom: 30px;
  }

  .guida-titolo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    color: var(--ink);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .guida-sotto {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 30px;
    line-height: 1.5;
  }

  .guida-animazione {
    width: 100%;
    max-width: 260px;
    margin-bottom: 30px;
  }

  .guida-rassicura {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-top: auto;
    padding-top: 20px;
  }

  .guida-rassicura b { color: var(--ink2); font-weight: 500; }

  /* Telefono stilizzato dentro l'animazione */
  .phone-mock {
    width: 150px;
    margin: 0 auto;
    border: 2px solid var(--ink);
    border-radius: 24px;
    background: white;
    padding: 10px 8px;
    position: relative;
    overflow: hidden;
  }

  .phone-mock-bar {
    height: 8px;
    background: var(--sand2);
    border-radius: 3px;
    margin-bottom: 6px;
  }

  .phone-mock-row {
    height: 6px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 5px;
    width: 80%;
  }

  .tap-dot {
    position: absolute;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
  }

  .ios-tap { bottom: 4px; left: 50%; transform: translateX(-50%); animation: tapPulse 2.2s ease-in-out infinite; }
  .android-tap { top: 6px; right: 6px; animation: tapPulse 2.2s ease-in-out infinite; }

  @keyframes tapPulse {
    0%   { opacity: 0; transform: scale(0.6) translateX(-50%); }
    15%  { opacity: 0.85; transform: scale(1) translateX(-50%); }
    35%  { opacity: 0.85; transform: scale(1) translateX(-50%); }
    55%  { opacity: 0; transform: scale(0.6) translateX(-50%); }
    100% { opacity: 0; }
  }
  .android-tap.tap-anim {
    animation-name: tapPulseNoTranslate;
  }
  @keyframes tapPulseNoTranslate {
    0%   { opacity: 0; transform: scale(0.6); }
    15%  { opacity: 0.85; transform: scale(1); }
    35%  { opacity: 0.85; transform: scale(1); }
    55%  { opacity: 0; transform: scale(0.6); }
    100% { opacity: 0; }
  }

  .share-icon, .menu-icon {
    position: absolute;
    font-size: 13px;
    color: white;
    z-index: 2;
  }
  .ios-tap .share-icon { bottom: 5px; left: 50%; transform: translateX(-50%); }
  .android-tap .menu-icon { top: 7px; right: 7px; }

  .guida-cta {
    margin-top: 24px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
  }
</style>
</head>
<body>

<div id="guida-overlay"></div>

<div id="app">
  <div class="header">
    <div class="logo">CORRELATIO</div>
    <div id="azienda-selector-slot"></div>
  </div>
  <div class="content" id="content">
    <div class="stato-msg"><div class="spinner"></div>Caricamento...</div>
  </div>
  <div class="tab-bar" id="tab-bar" style="display:none">
    <div class="tab active" data-tab="dashboard"><span class="tab-icon">⊞</span>Dashboard</div>
    <div class="tab" data-tab="fatture"><span class="tab-icon">🧾</span>Fatture</div>
    <div class="tab" data-tab="scadenze"><span class="tab-icon">🔔</span>Scadenze</div>
    <div class="tab" data-tab="magazzino"><span class="tab-icon">📦</span>Magazzino</div>
  </div>
</div>

<script>
const BACKEND_URL = "https://web-production-b61de.up.railway.app";

// -----------------------------------------------------------------------
// Gestione chiave licenza: la prima volta arriva dall'URL (dal QR code),
// poi va salvata per le visite successive senza dover riscansionare.
// -----------------------------------------------------------------------

function leggiChiaveDaUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get("chiave");
}

function salvaChiave(chiave) {
  localStorage.setItem("correlatio_chiave", chiave);
}

function leggiChiaveSalvata() {
  return localStorage.getItem("correlatio_chiave");
}

function aziendaSalvata() {
  return localStorage.getItem("correlatio_azienda");
}

function salvaAzienda(nome) {
  localStorage.setItem("correlatio_azienda", nome);
}

// Punto di ingresso: se l'URL porta una chiave nuova, la salviamo e
// "puliamo" l'indirizzo (così non resta visibile/condivisibile per sbaglio).
const chiaveDaUrl = leggiChiaveDaUrl();
if (chiaveDaUrl) {
  salvaChiave(chiaveDaUrl);
  window.history.replaceState({}, "", window.location.pathname);
}

const chiave = leggiChiaveSalvata();

// -----------------------------------------------------------------------
// Guida di installazione
//
// Logica (decisa insieme prima di costruirla):
// 1. Se il telefono dice "sto girando come app installata" -> niente guida.
// 2. Se non installata ma la guida è già stata vista in passato su questo
//    browser -> messaggio breve, non la guida intera.
// 3. Altrimenti -> guida obbligatoria, senza via di fuga, con l'animazione
//    giusta per iOS o Android rilevati automaticamente.
// -----------------------------------------------------------------------

function appGiaInstallata() {
  // Standard PWA: true quando l'app è aperta dall'icona Home, non dal browser.
  const standalone = window.matchMedia("(display-mode: standalone)").matches;
  // Fallback storico per Safari/iOS più vecchi.
  const iosStandalone = window.navigator.standalone === true;
  return standalone || iosStandalone;
}

function guidaGiaVista() {
  return localStorage.getItem("correlatio_guida_vista") === "true";
}

function segnaGuidaVista() {
  localStorage.setItem("correlatio_guida_vista", "true");
}

function rilevaPiattaforma() {
  const ua = navigator.userAgent || "";
  const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  return isIOS ? "ios" : "android";
}

function svgTelefonoIOS() {
  return `
    <div class="phone-mock">
      <div class="phone-mock-bar"></div>
      <div class="phone-mock-row"></div>
      <div class="phone-mock-row" style="width:60%"></div>
      <div class="phone-mock-row" style="width:70%"></div>
      <div class="tap-dot ios-tap"><span class="share-icon">⬆</span></div>
    </div>`;
}

function svgTelefonoAndroid() {
  return `
    <div class="phone-mock">
      <div class="phone-mock-bar"></div>
      <div class="phone-mock-row"></div>
      <div class="phone-mock-row" style="width:60%"></div>
      <div class="phone-mock-row" style="width:70%"></div>
      <div class="tap-dot android-tap tap-anim"><span class="menu-icon">⋮</span></div>
    </div>`;
}

function mostraGuidaInstallazione() {
  const piattaforma = rilevaPiattaforma();
  const overlay = document.getElementById("guida-overlay");

  const istruzione = piattaforma === "ios"
    ? `Tocca <b>Condividi</b> ${"⬆"} in basso, poi <b>"Aggiungi alla schermata Home"</b>`
    : `Tocca <b>⋮</b> in alto, poi <b>"Installa app"</b> o <b>"Aggiungi a schermata Home"</b>`;

  const animazione = piattaforma === "ios" ? svgTelefonoIOS() : svgTelefonoAndroid();

  overlay.innerHTML = `
    <div class="guida-logo">CORRELATIO</div>
    <div class="guida-titolo">Aggiungi Correlatio<br>alla tua schermata Home</div>
    <div class="guida-sotto">${istruzione}</div>
    <div class="guida-animazione">${animazione}</div>
    <div class="guida-rassicura">
      Fatto questo, troverai l'icona di <b>Correlatio</b> sulla tua schermata Home.<br>
      Non dovrai più scansionare nulla.
    </div>
  `;
  overlay.style.display = "flex";
}

function nascondiGuidaInstallazione() {
  document.getElementById("guida-overlay").style.display = "none";
}

function mostraAvvisoGiaInstallata() {
  // Caso: l'utente ha riscansionato il QR per errore, ma l'app è già
  // installata su questo telefono — nessuna guida, solo un avviso breve.
  const overlay = document.getElementById("guida-overlay");
  overlay.innerHTML = `
    <div class="guida-logo">CORRELATIO</div>
    <div class="guida-titolo">Hai già Correlatio installata!</div>
    <div class="guida-sotto">Cerca la sua icona sulla tua schermata Home — non serve installarla di nuovo.</div>
    <div class="guida-cta" id="continua-comunque">Continua qui per questa volta →</div>
  `;
  overlay.style.display = "flex";
  document.getElementById("continua-comunque").addEventListener("click", nascondiGuidaInstallazione);
}

function gestisciGuidaInstallazione() {
  if (appGiaInstallata()) {
    return; // Caso 1: niente da fare, va dritto ai dati.
  }
  if (guidaGiaVista()) {
    mostraAvvisoGiaInstallata(); // Caso 2.
    return;
  }
  mostraGuidaInstallazione(); // Caso 3.
  segnaGuidaVista();
}

gestisciGuidaInstallazione();

// -----------------------------------------------------------------------
// Chiamate al backend
// -----------------------------------------------------------------------

async function chiamaBackend(percorso) {
  const risposta = await fetch(BACKEND_URL + percorso, {
    headers: { "X-License-Key": chiave }
  });
  const dati = await risposta.json();
  if (!risposta.ok) {
    throw new Error(dati.errore || "Errore del server");
  }
  return dati;
}

// -----------------------------------------------------------------------
// Stato applicativo minimo
// -----------------------------------------------------------------------

let aziendaCorrente = aziendaSalvata();
let elencoAziende = [];

function mostraMessaggio(testo, errore = false) {
  document.getElementById("content").innerHTML =
    `<div class="stato-msg${errore ? ' errore' : ''}">${testo}</div>`;
}

function formattaEuro(valore) {
  const numero = Math.round(Number(valore) || 0);
  const conPunti = numero.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  return "€ " + conPunti;
}

function formattaOraSync(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
}

// -----------------------------------------------------------------------
// Selettore azienda (mostrato solo se ce n'è più di una)
// -----------------------------------------------------------------------

function renderSelettoreAzienda() {
  const slot = document.getElementById("azienda-selector-slot");
  if (elencoAziende.length <= 1) {
    slot.innerHTML = "";
    return;
  }
  slot.innerHTML = `<select class="azienda-selector" id="azienda-select"></select>`;
  const select = document.getElementById("azienda-select");
  elencoAziende.forEach(a => {
    const opt = document.createElement("option");
    opt.value = a.nome;
    opt.textContent = a.nome;
    if (a.nome === aziendaCorrente) opt.selected = true;
    select.appendChild(opt);
  });
  select.addEventListener("change", (e) => {
    aziendaCorrente = e.target.value;
    salvaAzienda(aziendaCorrente);
    const tabAttiva = document.querySelector(".tab.active");
    const nomeTab = tabAttiva ? tabAttiva.dataset.tab : "dashboard";
    CARICATORI[nomeTab]();
  });
}

// -----------------------------------------------------------------------
// Vista Dashboard
// -----------------------------------------------------------------------

async function caricaDashboard() {
  mostraMessaggio('<div class="spinner"></div>Caricamento dati...');
  try {
    const dati = await chiamaBackend(`/mobile/dashboard?azienda=${encodeURIComponent(aziendaCorrente)}`);
    renderDashboard(dati);
  } catch (errore) {
    mostraMessaggio(
      `Non riusciamo a caricare i dati.<br><br>${errore.message}`,
      true
    );
  }
}

function renderDashboard(d) {
  const max = Math.max(...(d.andamento_6_mesi || [1]));
  const mesi = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
  const meseCorrente = new Date().getMonth();
  const ultimiSei = [];
  for (let i = 5; i >= 0; i--) {
    ultimiSei.push(mesi[(meseCorrente - i + 12) % 12]);
  }

  const barre = (d.andamento_6_mesi || []).map((v, i) => {
    const h = Math.max(3, Math.round((v / max) * 60));
    const ultimo = i === (d.andamento_6_mesi.length - 1);
    return `<div class="bar-col">
      <div class="bar ${ultimo ? 'ultimo' : ''}" style="height:${h}px"></div>
      <div class="bar-lbl">${ultimiSei[i] || ''}</div>
    </div>`;
  }).join("");

  document.getElementById("content").innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Oggi</div>
        <div class="kpi-value">${formattaEuro(d.fatturato_oggi)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Questo mese</div>
        <div class="kpi-value">${formattaEuro(d.fatturato_mese)}</div>
        <div class="kpi-delta ${d.fatturato_mese >= d.fatturato_mese_scorso ? 'up' : 'down'}">
          vs ${formattaEuro(d.fatturato_mese_scorso)} mese scorso
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Incassato</div>
        <div class="kpi-value">${formattaEuro(d.incassato_mese)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Da incassare</div>
        <div class="kpi-value">${formattaEuro(d.da_incassare)}</div>
        <div class="kpi-delta neutral">${d.fatture_aperte || 0} fatture aperte</div>
      </div>
    </div>

    <div class="sec-label">Andamento 6 mesi</div>
    <div class="chart-card">
      <div class="bars">${barre}</div>
    </div>

    <div class="sync-info">Aggiornato alle ${formattaOraSync(d.ultima_sync)}</div>
  `;

  document.getElementById("tab-bar").style.display = "flex";
}

// -----------------------------------------------------------------------
// Vista Fatture
// -----------------------------------------------------------------------

function badgeStato(stato) {
  const etichette = { pagata: "Pagata", in_attesa: "In attesa", scaduta: "Scaduta" };
  return `<span class="badge ${stato}">${etichette[stato] || stato}</span>`;
}

function formattaData(iso) {
  if (!iso) return "";
  const [a, m, g] = iso.split("-");
  return `${g}/${m}/${a}`;
}

async function caricaFatture() {
  mostraMessaggio('<div class="spinner"></div>Caricamento fatture...');
  try {
    const d = await chiamaBackend(`/mobile/fatture?azienda=${encodeURIComponent(aziendaCorrente)}`);
    renderFatture(d);
  } catch (errore) {
    mostraMessaggio(`Non riusciamo a caricare le fatture.<br><br>${errore.message}`, true);
  }
}

function renderFatture(d) {
  const attive = d.attive || [];
  const passive = d.passive || [];

  const rigaFattura = (f, segnoMeno) => `
    <div class="item-card">
      <div>
        <div class="item-nome">${f.nome}</div>
        <div class="item-data">${formattaData(f.data_emissione)} → scad. ${formattaData(f.data_scadenza)}</div>
        ${badgeStato(f.stato)}
      </div>
      <div class="item-importo">${segnoMeno ? '−' : ''}${formattaEuro(f.importo)}</div>
    </div>`;

  const blocco = (lista, segnoMeno) => lista.length
    ? lista.map(f => rigaFattura(f, segnoMeno)).join("")
    : `<div class="vuoto-msg">Nessuna fattura da mostrare.</div>`;

  document.getElementById("content").innerHTML = `
    <div class="sec-label">Attive — da incassare</div>
    ${blocco(attive, false)}
    <div class="sec-label">Passive — da pagare</div>
    ${blocco(passive, true)}
    <div class="sync-info">Aggiornato alle ${formattaOraSync(d.ultima_sync)}</div>
  `;
}

// -----------------------------------------------------------------------
// Vista Scadenze
// -----------------------------------------------------------------------

async function caricaScadenze() {
  mostraMessaggio('<div class="spinner"></div>Caricamento scadenze...');
  try {
    const d = await chiamaBackend(`/mobile/scadenze?azienda=${encodeURIComponent(aziendaCorrente)}`);
    renderScadenze(d);
  } catch (errore) {
    mostraMessaggio(`Non riusciamo a caricare le scadenze.<br><br>${errore.message}`, true);
  }
}

function renderScadenze(d) {
  const urgenti = d.urgenti || [];
  const prossime = d.prossime || [];

  const riga = (s) => `
    <div class="item-card">
      <div>
        <div class="item-nome">${s.descrizione}</div>
        <div class="item-data">${formattaData(s.data)}</div>
      </div>
      <div class="item-importo">${formattaEuro(s.importo)}</div>
    </div>`;

  const blocco = (lista) => lista.length
    ? lista.map(riga).join("")
    : `<div class="vuoto-msg">Nessuna scadenza da mostrare.</div>`;

  document.getElementById("content").innerHTML = `
    <div class="sec-label" style="color:var(--error)">Urgenti</div>
    ${blocco(urgenti)}
    <div class="sec-label">Prossime</div>
    ${blocco(prossime)}
    <div class="sync-info">Aggiornato alle ${formattaOraSync(d.ultima_sync)}</div>
  `;
}

// -----------------------------------------------------------------------
// Vista Magazzino
// -----------------------------------------------------------------------

async function caricaMagazzino() {
  mostraMessaggio('<div class="spinner"></div>Caricamento magazzino...');
  try {
    const d = await chiamaBackend(`/mobile/magazzino?azienda=${encodeURIComponent(aziendaCorrente)}`);
    renderMagazzino(d);
  } catch (errore) {
    mostraMessaggio(`Non riusciamo a caricare il magazzino.<br><br>${errore.message}`, true);
  }
}

function renderMagazzino(d) {
  const articoli = d.articoli || [];

  if (articoli.length === 0) {
    document.getElementById("content").innerHTML = `<div class="vuoto-msg">Nessun articolo con scorta minima impostata.</div>`;
    return;
  }

  const etichette = { critico: "Sotto scorta minima", attenzione: "Scorta bassa", ok: "Disponibilità buona" };
  const colori = { critico: "var(--error)", attenzione: "var(--gold)", ok: "var(--accent)" };

  const righe = articoli.map(a => {
    const pct = Math.min(100, Math.round((a.giacenza / (a.minima * 1.5 || 1)) * 100));
    return `
      <div class="item-card" style="flex-direction:column;align-items:stretch">
        <div style="display:flex;justify-content:space-between;width:100%">
          <div class="item-nome">${a.nome}</div>
          <div class="item-importo" style="font-size:14px">${a.giacenza}</div>
        </div>
        <div class="mag-bar-bg"><div class="mag-bar-fill" style="width:${pct}%;background:${colori[a.stato]}"></div></div>
        <div class="mag-status ${a.stato}">${etichette[a.stato] || a.stato}</div>
      </div>`;
  }).join("");

  document.getElementById("content").innerHTML = `
    ${righe}
    <div class="sync-info">Aggiornato alle ${formattaOraSync(d.ultima_sync)}</div>
  `;
}

// -----------------------------------------------------------------------
// Router tra le 4 tab
// -----------------------------------------------------------------------

const CARICATORI = {
  dashboard: caricaDashboard,
  fatture: caricaFatture,
  scadenze: caricaScadenze,
  magazzino: caricaMagazzino,
};

function vaiAllaTab(nomeTab) {
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.tab === nomeTab);
  });
  CARICATORI[nomeTab]();
}

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => vaiAllaTab(tab.dataset.tab));
});

// -----------------------------------------------------------------------
// Avvio
// -----------------------------------------------------------------------

async function avvia() {
  if (!chiave) {
    mostraMessaggio(
      "Nessuna licenza collegata.<br><br>Scansiona il codice QR da Correlatio Desktop per accedere.",
      true
    );
    return;
  }

  try {
    const risposta = await chiamaBackend("/mobile/aziende");
    elencoAziende = risposta.aziende || [];

    if (elencoAziende.length === 0) {
      mostraMessaggio(
        "Nessun dato sincronizzato ancora.<br><br>Apri Correlatio Desktop almeno una volta per iniziare a vedere i tuoi dati qui.",
        true
      );
      return;
    }

    // Se l'azienda salvata non è (più) tra quelle disponibili, usa la prima.
    if (!aziendaCorrente || !elencoAziende.some(a => a.nome === aziendaCorrente)) {
      aziendaCorrente = elencoAziende[0].nome;
      salvaAzienda(aziendaCorrente);
    }

    renderSelettoreAzienda();
    await caricaDashboard();

  } catch (errore) {
    mostraMessaggio(
      `Non riusciamo a verificare la tua licenza.<br><br>${errore.message}`,
      true
    );
  }
}

avvia();

// Registrazione del service worker, richiesta per l'installabilità.
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
